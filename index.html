<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescission — Restore the original destination of protected URLs</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      :root {
        /* Dark (default) — neutral ink + violet jewel accent */
        --bg: #101014;
        --surface-1: #17171f;
        --surface-2: #1e1e28;
        --border: #2a2a36;
        --border-strong: #3a3a4a;
        --text: #ececf2;
        --text-muted: #9a95a8;

        --accent: #8b7bff;
        --accent-hover: #7a68f5;
        --accent-ink: #16102e;
        --accent-soft: rgba(139, 123, 255, 0.14);

        --success: #34d399;
        --success-text: #6ee7b7;
        --success-soft: rgba(52, 211, 153, 0.10);

        --warning: #fbbf24;
        --warning-text: #fcd34d;
        --warning-soft: rgba(251, 191, 36, 0.10);

        --danger: #f87171;
        --danger-text: #fca5a5;
        --danger-soft: rgba(248, 113, 113, 0.10);

        --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', Menlo, Consolas, monospace;
        --sans: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        --radius: 10px;
      }

      body.light {
        --bg: #faf9fc;
        --surface-1: #ffffff;
        --surface-2: #f5f3fa;
        --border: #e8e3f0;
        --border-strong: #d6cee4;
        --text: #1b1725;
        --text-muted: #6c6579;

        --accent: #7c3aed;
        --accent-hover: #6d28d9;
        --accent-ink: #ffffff;
        --accent-soft: rgba(124, 58, 237, 0.10);

        --success: #059669;
        --success-text: #047857;
        --success-soft: #ecfdf5;

        --warning: #d97706;
        --warning-text: #92400e;
        --warning-soft: #fffbeb;

        --danger: #dc2626;
        --danger-text: #991b1b;
        --danger-soft: #fef2f2;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 1.5rem;
        transition: background 0.2s ease, color 0.2s ease;
      }

      .container { max-width: 860px; margin: 0 auto; }

      /* Header */
      .masthead {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .brand-row { display: flex; align-items: center; gap: 0.6rem; }
      .brand-mark {
        width: 2rem; height: 2rem; color: var(--accent);
        display: flex; align-items: center; justify-content: center;
      }
      .brand-mark svg { width: 1.9rem; height: 1.9rem; }
      .wordmark {
        font-size: 1.7rem; font-weight: 700; letter-spacing: -0.01em; color: var(--text);
      }
      .tagline { font-size: 0.9rem; color: var(--text-muted); margin-top: 0.2rem; }
      .header-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }

      .local-chip {
        display: inline-flex; align-items: center; gap: 0.4rem;
        font-size: 0.75rem; color: var(--text-muted);
        border: 1px solid var(--border); border-radius: 999px;
        padding: 0.35rem 0.7rem; white-space: nowrap;
      }
      .local-chip svg { width: 0.85rem; height: 0.85rem; color: var(--success); }

      .theme-toggle {
        width: 2.3rem; height: 2.3rem; border-radius: var(--radius);
        border: 1px solid var(--border); background: var(--surface-1);
        color: var(--text-muted); cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: border-color 0.15s, color 0.15s, background 0.15s;
      }
      .theme-toggle:hover { border-color: var(--border-strong); color: var(--text); }
      .theme-toggle svg { width: 1.15rem; height: 1.15rem; }

      /* Cards */
      .card {
        background: var(--surface-1);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem;
        margin-bottom: 1rem;
      }
      .card-head { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.85rem; }
      .card-head svg { width: 1.3rem; height: 1.3rem; color: var(--accent); }
      .card-head h2 { font-size: 1.05rem; font-weight: 600; color: var(--text); }

      .label {
        display: block; font-size: 0.8rem; font-weight: 600;
        color: var(--text-muted); margin-bottom: 0.5rem;
        text-transform: uppercase; letter-spacing: 0.04em;
      }

      textarea {
        width: 100%; padding: 0.9rem; border: 1px solid var(--border);
        background: var(--surface-2); color: var(--text);
        border-radius: var(--radius); font-family: var(--mono);
        font-size: 0.85rem; min-height: 7rem; resize: vertical; outline: none;
        transition: border-color 0.15s;
      }
      textarea:focus { border-color: var(--accent); }
      textarea::placeholder { color: var(--text-muted); }

      /* Decoder chips */
      .chip-row { display: flex; flex-wrap: wrap; gap: 0.5rem; }
      .chip {
        display: inline-flex; align-items: center; gap: 0.45rem;
        padding: 0.45rem 0.8rem; border-radius: var(--radius);
        border: 1px solid var(--border); background: var(--surface-2);
        cursor: pointer; font-size: 0.83rem; font-weight: 500; color: var(--text);
        transition: all 0.15s; user-select: none;
      }
      .chip:hover { border-color: var(--border-strong); }
      .chip.selected { border-color: var(--accent); background: var(--accent-soft); color: var(--text); }
      .chip input { position: absolute; opacity: 0; pointer-events: none; }
      .chip .dot { width: 0.5rem; height: 0.5rem; border-radius: 50%; flex-shrink: 0; }
      .dot.verified { background: var(--success); }
      .dot.unverified { background: var(--text-muted); opacity: 0.6; }
      .dot.detect { background: var(--warning); }

      /* Buttons */
      .actions { display: flex; gap: 0.75rem; margin-bottom: 1rem; }
      button {
        font-family: var(--sans); font-weight: 600; cursor: pointer;
        padding: 0.7rem 1.3rem; border-radius: var(--radius); font-size: 0.92rem;
        display: inline-flex; align-items: center; justify-content: center; gap: 0.45rem;
        border: 1px solid transparent; transition: all 0.15s;
      }
      button svg { width: 1.05rem; height: 1.05rem; }
      .btn-primary { flex: 1; background: var(--accent); color: var(--accent-ink); }
      .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
      .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
      .btn-ghost { background: transparent; color: var(--text-muted); border-color: var(--border); }
      .btn-ghost:hover { border-color: var(--border-strong); color: var(--text); }

      .btn-open {
        flex: 1; text-decoration: none; background: var(--surface-2);
        color: var(--text); border-color: var(--border);
      }
      .btn-open:hover { border-color: var(--border-strong); }
      .btn-copy { flex: 1; background: var(--accent); color: var(--accent-ink); }
      .btn-copy:hover { background: var(--accent-hover); }
      .btn-copy.copied { background: var(--success); color: #052e1a; }

      /* Alerts */
      .alert {
        border-radius: var(--radius); padding: 0.85rem 1rem; margin-bottom: 1rem;
        display: flex; align-items: flex-start; gap: 0.6rem; border: 1px solid;
        font-size: 0.9rem;
      }
      .alert svg { width: 1.1rem; height: 1.1rem; flex-shrink: 0; margin-top: 0.1rem; }
      .alert-error { background: var(--danger-soft); border-color: var(--danger); color: var(--danger-text); }
      .alert-error svg { color: var(--danger); }
      .alert-warning { background: var(--warning-soft); border-color: var(--warning); color: var(--warning-text); }
      .alert-warning svg { color: var(--warning); }

      /* Steps */
      .step { border-left: 3px solid var(--accent); padding-left: 0.9rem; margin-bottom: 1rem; }
      .step:last-child { margin-bottom: 0; }
      .step.status-partial, .step.status-undecodable { border-left-color: var(--warning); }
      .step.status-error { border-left-color: var(--danger); }
      .step-head { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
      .badge {
        background: var(--accent-soft); color: var(--accent);
        padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600;
      }
      .step-name { color: var(--text); font-weight: 500; font-size: 0.9rem; }
      .step-status {
        font-size: 0.72rem; font-weight: 600; padding: 0.15rem 0.5rem; border-radius: 999px;
        text-transform: uppercase; letter-spacing: 0.03em;
      }
      .step-status.ok { background: var(--success-soft); color: var(--success-text); }
      .step-status.partial, .step-status.undecodable { background: var(--warning-soft); color: var(--warning-text); }
      .step-status.error { background: var(--danger-soft); color: var(--danger-text); }

      .code-block {
        background: var(--surface-2); border: 1px solid var(--border);
        padding: 0.6rem 0.75rem; border-radius: 8px; margin-bottom: 0.5rem;
      }
      .code-block:last-child { margin-bottom: 0; }
      .code-block.out { border-color: var(--success); background: var(--success-soft); }
      .code-label { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 0.04em; }
      .code-text { font-family: var(--mono); font-size: 0.82rem; word-break: break-all; color: var(--text); }
      .step-note { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }

      /* Result */
      .result-box {
        border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; border: 1px solid;
      }
      .result-ok { background: var(--success-soft); border-color: var(--success); }
      .result-warn { background: var(--warning-soft); border-color: var(--warning); }
      .result-text { font-family: var(--mono); font-size: 0.88rem; word-break: break-all; color: var(--text); }
      .result-note { font-size: 0.86rem; color: var(--text-muted); line-height: 1.55; margin-top: 0.4rem; }
      .preview-trick {
        font-family: var(--mono); font-size: 0.8rem; color: var(--text);
        background: var(--surface-2); border: 1px solid var(--border);
        padding: 0.5rem 0.65rem; border-radius: 8px; margin-top: 0.6rem; word-break: break-all;
      }

      /* Supported services */
      .svc-grid { display: grid; grid-template-columns: 1fr; gap: 0.5rem; }
      @media (min-width: 620px) { .svc-grid { grid-template-columns: 1fr 1fr; } }
      .svc {
        display: flex; align-items: center; gap: 0.5rem; font-size: 0.86rem;
        color: var(--text); padding: 0.35rem 0; 
      }
      .svc .dot { width: 0.5rem; height: 0.5rem; border-radius: 50%; flex-shrink: 0; }
      .svc-tag {
        margin-left: auto; font-size: 0.7rem; font-weight: 600; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.03em;
      }
      .legend { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px solid var(--border); }
      .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; color: var(--text-muted); }
      .legend-item .dot { width: 0.5rem; height: 0.5rem; border-radius: 50%; }

      .footnote { font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-top: 0.5rem; line-height: 1.6; }
      .footnote a { color: var(--accent); text-decoration: none; }
      .footnote a:hover { text-decoration: underline; }
    </style>
</head>

        layers: '<path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/>',
        'circle-check': '<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>',
        copy: '<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>',
        check: '<path d="M20 6 9 17l-5-5"/>',
        'external-link': '<path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>',
        'circle-slash': '<circle cx="12" cy="12" r="10"/><path d="m4.9 4.9 14.2 14.2"/>',
        'alert-triangle': '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
        'list-checks': '<path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/>'
      };

      const Icon = ({ name, style }) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
             strokeLinecap="round" strokeLinejoin="round" style={style} aria-hidden="true"
             dangerouslySetInnerHTML={{ __html: ICON_PATHS[name] || '' }} />
      );

      const App = () => {
        const [input, setInput] = useState('');
        const [selected, setSelected] = useState('auto');
        const [result, setResult] = useState(null); // {finalUrl, steps, terminal}
        const [error, setError] = useState('');
        const [busy, setBusy] = useState(false);
        const [copied, setCopied] = useState(false);
        const [theme, setTheme] = useState('dark');

        // Theme init + apply
        useEffect(() => {
          let saved = 'dark';
          try { saved = localStorage.getItem('rescission-theme') || 'dark'; } catch (e) {}
          setTheme(saved);
        }, []);
        useEffect(() => {
          document.body.classList.toggle('light', theme === 'light');
          try { localStorage.setItem('rescission-theme', theme); } catch (e) {}
        }, [theme]);

        const handleDecode = () => {
          setError(''); setResult(null); setCopied(false); setBusy(true);
          const url = input.trim();
          if (!url) { setError('Enter a URL to decode.'); setBusy(false); return; }
          try {
            const out = selected === 'auto' ? R.decode(url) : R.decodeWith(url, selected);
            if (out.steps.length === 0) {
              setError('No recognized URL rewriting service in this link.');
            } else {
              setResult(out);
            }
          } catch (e) {
            setError('Could not decode this link: ' + e.message);
          }
          setBusy(false);
        };

        const handleReset = () => {
          setInput(''); setResult(null); setError(''); setSelected('auto'); setCopied(false);
        };

        const handleCopy = (text) => {
          const done = () => { setCopied(true); setTimeout(() => setCopied(false), 1800); };
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done).catch(done);
          } else { done(); }
        };

        const lastStep = result && result.steps.length ? result.steps[result.steps.length - 1] : null;
        const terminal = result ? result.terminal : null;
        const fullyDecoded = result && !terminal;

        return (
          <div className="container">
            <div className="masthead">
              <div>
                <div className="brand-row">
                  <span className="brand-mark"><Icon name="scissors" /></span>
                  <span className="wordmark">Rescission</span>
                </div>
                <p className="tagline">Restore the original destination of protected URLs.</p>
              </div>
              <div className="header-actions">
                <span className="local-chip">
                  <Icon name="shield-check" /> Runs in your browser
                </span>
                <button
                  className="theme-toggle"
                  onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                  aria-label={theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'}
                >
                  {theme === 'dark' ? (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <circle cx="12" cy="12" r="4"></circle>
                      <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"></path>
                    </svg>
                  ) : (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                    </svg>
                  )}
                </button>
              </div>
            </div>

            <div className="card">
              <label className="label">Encoded URL</label>
              <textarea
                value={input}
                onChange={(e) => setInput(e.target.value)}
                placeholder="Paste a rewritten link here…"
              />
            </div>

            <div className="card">
              <label className="label">Decoder</label>
              <div className="chip-row">
                <label className={'chip' + (selected === 'auto' ? ' selected' : '')}>
                  <input type="radio" name="decoder" value="auto"
                    checked={selected === 'auto'} onChange={(e) => setSelected(e.target.value)} />
                  <Icon name="wand-2" style={{ width: '0.9rem', height: '0.9rem' }} />
                  <span>Auto-detect</span>
                </label>
                {R.services.map((s) => (
                  <label key={s.key} className={'chip' + (selected === s.key ? ' selected' : '')}>
                    <input type="radio" name="decoder" value={s.key}
                      checked={selected === s.key} onChange={(e) => setSelected(e.target.value)} />
                    <span className={'dot ' + (s.type === 'detect' ? 'detect' : s.verified ? 'verified' : 'unverified')}></span>
                    <span>{s.name}</span>
                  </label>
                ))}
              </div>
            </div>

            <div className="actions">
              <button className="btn-primary" onClick={handleDecode} disabled={busy}>
                <Icon name="unlock" />
                {busy ? 'Decoding…' : 'Decode URL'}
              </button>
              <button className="btn-ghost" onClick={handleReset}>Reset</button>
            </div>

            {error && (
              <div className="alert alert-error">
                <Icon name="alert-circle" />
                <span>{error}</span>
              </div>
            )}

            {result && result.steps.length > 0 && (
              <div className="card">
                <div className="card-head">
                  <Icon name="layers" />
                  <h2>Decoding process</h2>
                </div>
                {result.steps.map((step, i) => (
                  <div key={i} className={'step status-' + step.status}>
                    <div className="step-head">
                      <span className="badge">Step {i + 1}</span>
                      <span className="step-name">{step.service}</span>
                      <span className={'step-status ' + step.status}>
                        {step.status === 'ok' ? 'decoded'
                          : step.status === 'partial' ? 'partial'
                          : step.status === 'undecodable' ? 'opaque token'
                          : 'error'}
                      </span>
                    </div>
                    {(step.status === 'undecodable' || (step.status === 'error')) ? (
                      <p className="step-note">{step.message}</p>
                    ) : (
                      <>
                        <div className="code-block">
                          <p className="code-label">Input</p>
                          <p className="code-text">{step.input}</p>
                        </div>
                        <div className="code-block out">
                          <p className="code-label">Output</p>
                          <p className="code-text">{step.output}</p>
                        </div>
                        {step.status === 'partial' && step.message && (
                          <p className="step-note" style={{ marginTop: '0.5rem' }}>{step.message}</p>
                        )}
                      </>
                    )}
                  </div>
                ))}
              </div>
            )}

            {fullyDecoded && (
              <div className="card">
                <div className="card-head">
                  <Icon name="circle-check" />
                  <h2>Decoded URL</h2>
                </div>
                <div className="result-box result-ok">
                  <p className="result-text">{result.finalUrl}</p>
                </div>
                <div className="actions" style={{ marginBottom: 0 }}>
                  <button className={'btn-copy' + (copied ? ' copied' : '')} onClick={() => handleCopy(result.finalUrl)}>
                    <Icon name={copied ? 'check' : 'copy'} />
                    {copied ? 'Copied' : 'Copy'}
                  </button>
                  <a className="btn-open" href={result.finalUrl} target="_blank" rel="noopener noreferrer">
                    <Icon name="external-link" /> Open
                  </a>
                </div>
              </div>
            )}

            {terminal === 'partial' && (
              <div className="card">
                <div className="card-head">
                  <Icon name="circle-slash" />
                  <h2>Partial result</h2>
                </div>
                <div className="result-box result-warn">
                  <p className="result-text">{result.finalUrl}</p>
                </div>
                <p className="result-note">{lastStep && lastStep.message}</p>
                <div className="actions" style={{ marginBottom: 0, marginTop: '0.85rem' }}>
                  <button className={'btn-copy' + (copied ? ' copied' : '')} onClick={() => handleCopy(result.finalUrl)}>
                    <Icon name={copied ? 'check' : 'copy'} />
                    {copied ? 'Copied' : 'Copy domain'}
                  </button>
                </div>
              </div>
            )}

            {terminal === 'undecodable' && (
              <div className="alert alert-warning">
                <Icon name="alert-triangle" />
                <div>
                  <p style={{ fontWeight: 600, marginBottom: '0.25rem' }}>
                    {lastStep ? lastStep.service : 'This service'} can't be decoded locally
                  </p>
                  <p style={{ lineHeight: 1.55 }}>{lastStep && lastStep.message}</p>
                  {lastStep && lastStep.preview && (
                    <div className="preview-trick">{lastStep.preview}</div>
                  )}
                </div>
              </div>
            )}

            <div className="card">
              <div className="card-head">
                <Icon name="list-checks" />
                <h2>Supported services</h2>
              </div>
              <div className="svc-grid">
                {R.services.map((s, i) => (
                  <div key={i} className="svc">
                    <span className={'dot ' + (s.type === 'detect' ? 'detect' : s.verified ? 'verified' : 'unverified')}></span>
                    <span>{s.name}</span>
                    <span className="svc-tag">
                      {s.type === 'detect' ? 'detect only' : s.verified ? 'verified' : 'unverified'}
                    </span>
                  </div>
                ))}
              </div>
              <div className="legend">
                <span className="legend-item"><span className="dot verified"></span> Verified against live formats</span>
                <span className="legend-item"><span className="dot unverified"></span> Pattern-based, unverified</span>
                <span className="legend-item"><span className="dot detect"></span> Opaque token — detect only</span>
              </div>
            </div>

            <div className="alert alert-warning">
              <Icon name="alert-triangle" />
              <div>
                <p style={{ fontWeight: 600, marginBottom: '0.25rem' }}>Decoding removes a safety layer</p>
                <p style={{ lineHeight: 1.55 }}>
                  A rewritten link was scanned for a reason. Only decode links from senders you trust —
                  the original destination can still be malicious even when decoding succeeds.
                </p>
              </div>
            </div>

            <p className="footnote">
              Everything runs locally in your browser. Pasted links are never sent anywhere.
            </p>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
