<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rescission — Restore the original destination of protected URLs</title>
  <meta name="description" content="Decode, clean, resolve, and inspect security-wrapped URLs. Runs entirely in your browser — nothing leaves this page.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app-wrapper">

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="site-header">
    <div class="brand">
      <div class="brand-icon">
        <!-- Scissors icon -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="6" cy="6" r="3"/>
          <circle cx="6" cy="18" r="3"/>
          <line x1="20" y1="4" x2="8.12" y2="15.88"/>
          <line x1="14.47" y1="14.48" x2="20" y2="20"/>
          <line x1="8.12" y1="8.12" x2="12" y2="12"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>Rescission</h1>
        <div class="tagline">Restore the original destination of protected URLs</div>
      </div>
    </div>
    <div class="header-actions">
      <span id="worker-chip" class="badge-local">🔒 Local only</span>
      <button id="settings-btn" class="theme-toggle" aria-label="Settings" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button id="theme-btn" class="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle theme">
        <!-- filled by JS -->
      </button>
    </div>
  </header>

  <!-- ── Input Card ──────────────────────────────────────── -->
  <div class="input-card">
    <label class="input-label" for="url-input">Source URL</label>
    <textarea
      id="url-input"
      class="url-textarea"
      placeholder="Paste a Proofpoint, Safe Links, Barracuda, Mimecast, or any wrapped / encoded URL…"
      spellcheck="false"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
    ></textarea>

    <!-- Stage Toggles -->
    <div id="stage-toggles" class="stage-toggles"></div>
    <div id="sub-opts" class="stage-sub-opts"></div>

    <!-- Action Row -->
    <div class="action-row">
      <button id="process-btn" class="btn-primary">
        <!-- icon injected by JS -->
        Process URL
      </button>
      <button id="reset-btn" class="btn-secondary" title="Clear and reset">
        ↺ Reset
      </button>
    </div>
  </div>

  <!-- ── Pipeline Bar ────────────────────────────────────── -->
  <div id="pipeline-bar" class="pipeline-bar"></div>

  <!-- ── Results ────────────────────────────────────────── -->
  <div id="results-area" class="results-area"></div>

</div>

<script src="js/app.js"></script>
</body>
</html>
